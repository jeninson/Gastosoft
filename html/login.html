<!doctype html>

<html class="light" lang="es">
  <head>
    <meta charset="utf-8" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />
    <title>GastoSoft - Iniciar Sesión</title>    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="../js/tailwind-config.js"></script>
    <link rel="stylesheet" href="../css/estilo_sticht.css" />
  </head>
  <body class="min-h-screen flex flex-col font-body-md text-on-background">
    <!-- Top Navigation (Shell Implementation) -->
    <!-- Nav suppressed as per UX Goal for transactional/focused screens -->
    <main class="flex-grow flex items-center justify-center px-md py-xl">
      <div class="w-full max-w-[440px]">
        <!-- Login Card -->
        <div
          class="bg-surface-container-lowest border border-outline-variant shadow-[0_2px_4px_rgba(15,23,42,0.04)] rounded-lg overflow-hidden"
        >
          <div class="p-xl space-y-xl">
            <!-- Identity Section -->
            <div class="text-center space-y-sm">
              <div
                class="inline-flex items-center justify-center p-sm bg-primary rounded-lg mb-md"
              >
                <span
                  class="material-symbols-outlined text-on-primary"
                  data-icon="account_balance_wallet"
                  >account_balance_wallet</span
                >
              </div>
              <h1
                class="font-headline-md text-headline-md text-primary tracking-tight"
              >
                GastoSoft
              </h1>
              <p class="font-body-lg text-body-lg text-secondary">
                Bienvenido de nuevo
              </p>
            </div>
            <!-- Form Section -->
            <form class="space-y-lg" action="" method="get" name="loginForm" id="loginForm">
              <div class="space-y-md">
                <!-- Email Field -->
                <div class="space-y-xs">
                  <label class="font-label-md text-label-md text-on-surface-variant uppercase" for="email">Correo electrónico</label>
                  <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
                      <span class="material-symbols-outlined text-outline text-[18px]" data-icon="mail">mail</span>
                    </div>
                    <input id="email" name="email" type="email" required value="" placeholder="" class="block w-full pl-xl pr-md py-md bg-surface border border-outline-variant rounded-lg font-body-md focus:ring-2 focus:ring-primary-fixed focus:border-primary-fixed-dim transition-all outline-none">
                  </div>
                </div>
                <!-- Password Field -->
                <div class="space-y-xs">
                  <div class="flex justify-between items-end">
                    <label for="clave" class="font-label-md text-label-md text-on-surface-variant uppercase">Contraseña</label>
                    <a href="#"class="font-label-md text-label-md text-primary hover:underline transition-all">¿Olvidaste tu contraseña?</a>
                  </div>
                  <div class="relative">
                    <div class="absolute inset-y-0 left-0 pl-md flex items-center pointer-events-none">
                      <span class="material-symbols-outlined text-outline text-[18px]" data-icon="lock">lock</span>
                    </div>
                    <input id="clave" name="clave" placeholder="" type="text" value="" required class="block w-full pl-xl pr-md py-md bg-surface border border-outline-variant rounded-lg font-body-md focus:ring-2 focus:ring-primary-fixed focus:border-primary-fixed-dim transition-all outline-none">
                  </div>
                </div>
              </div>
              <!-- Checkbox Section -->
              <div class="flex items-center">
                <input id="remember" name="remember" type="checkbox" class="h-4 w-4 text-primary border-outline-variant rounded focus:ring-primary">
                <label class="ml-sm font-body-sm text-body-sm text-on-surface-variant" for="remember">Recordarme</label>
              </div>
              <!-- Primary Action -->
              <button type="submit" id="btnLogin" name="btnLogin" class="w-full bg-primary text-on-primary font-label-md text-body-md py-md px-lg rounded-lg shadow-sm hover:opacity-90 active:opacity-80 transition-all flex items-center justify-center gap-sm">
                <span>Iniciar Sesión</span>
                <span class="material-symbols-outlined text-[18px]" data-icon="login">login</span>
              </button>
            </form>
            <!-- Secondary Footer Info -->
            <div class="pt-lg border-t border-outline-variant text-center">
              <p class="font-body-sm text-body-sm text-on-surface-variant">
                ¿No tienes una cuenta?
                <a class="text-primary font-semibold hover:underline" href="#"
                  >Contacta a tu administrador</a
                >
              </p>
            </div>
          </div>
        </div>
        <!-- Visual Decorative Element (Subtle Logo/Pattern) -->
        <div class="mt-xl flex justify-center gap-xl opacity-20">
          <img
            class="h-6 object-contain grayscale"
            data-alt="A sophisticated grayscale architectural detail of a modern enterprise skyscraper. The image features sharp linear perspective and clean geometric lines against a neutral sky, evoking a sense of corporate stability and high-end professional reliability. The lighting is bright and crisp, typical of a high-key light mode aesthetic."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuBiuKZbmY_NExNAk_gPeJcJB0bKX76c5UNw8ucLWHFHl0NGHL8V9TYcCMz10x7aTw_CZQ26xln5wFCRoBt6TCFE91dj4N2Nt_BqmYt7f6VmjPzLHOqegaskcF43mPKZnCZB25C8j6oS-_-lYRhc6YX5CtgiA7WE7zlf6If7P5ICrKnoO1dYkRjf7hLiTkxvbAAcsfnbDZbXTfDzwH97vVp8Y0s6D1zPW9-yv5haff-3SD10mGBAviN5Opz46QT5Zgf0zPZdvABIBI6P"
          />
          <img
            class="h-6 object-contain grayscale"
            data-alt="A clean minimalist graphic showing a secure digital verification shield emblem. The design is rendered in a professional deep charcoal and cool gray palette with subtle gradients. The lighting is diffused and modern, emphasizing precision and data security within a corporate software environment."
            src="https://lh3.googleusercontent.com/aida-public/AB6AXuCsvFu4cRsSrZ0-8KCuIXNiZYn13huGqssa4p9kR71qub2_NMV63o0vOuaHqwYk1IfBWV4mw3qdbNRQ1awWamTJr0uMF2pIjOCwWkm2jfqAyvRgMvzyzx1uIksHsYvUIMPxEmkDs7Fjvo-0QebYmbNRI9aBMDdR1BFM2vtdw1WG49tW4BlOYTLoGv0Wfe06ceIRZkebFFzRVtC84jk784o9HV5jgvkrIIGC-VXJYcqsu8GcX-hRuBg5bXsH5lPEeYT1iiVdTlLLniwO"
          />
        </div>
      </div>
    </main>
    <!-- Footer (Shell Implementation) -->
    <footer
      class="w-full bg-surface-container-low border-t border-outline-variant"
    >
      <div
        class="flex flex-col md:flex-row justify-between items-center px-lg py-xl w-full max-w-container-max mx-auto gap-md"
      >
        <div class="flex flex-col items-center md:items-start gap-xs">
          <span
            class="font-headline-sm text-headline-sm text-on-surface-variant"
            >GastoSoft</span
          >
          <p class="font-body-sm text-body-sm text-secondary">
            © 2024 GastoSoft Enterprise Systems. All rights reserved.
          </p>
        </div>
        <div class="flex flex-wrap justify-center gap-lg">
          <a
            class="font-body-sm text-body-sm text-on-surface-variant hover:underline hover:text-primary transition-all duration-150"
            href="#"
            >Privacy Policy</a
          >
          <a
            class="font-body-sm text-body-sm text-on-surface-variant hover:underline hover:text-primary transition-all duration-150"
            href="#"
            >Terms of Service</a
          >
          <a
            class="font-body-sm text-body-sm text-on-surface-variant hover:underline hover:text-primary transition-all duration-150"
            href="#"
            >Security Standards</a
          >
          <a
            class="font-body-sm text-body-sm text-on-surface-variant hover:underline hover:text-primary transition-all duration-150"
            href="#"
            >Contact Support</a
          >
        </div>
      </div>
    </footer>
    <script src="../js/main.js" type="module"></script>
    <script src="../js/md5.js"></script>
  </body>
</html>
