<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Inicio de Sesion</title>
    <link rel="stylesheet" href="estilo_login.css">
</head>
<body>
    <main>
        <div class="contenedor">
            <div class="titulo">
                <h1>Iniciar sesión</h1>
                <span>¿Es tu primera vez?</span> <a href="">Registrate</a>
            </div>
            <div class="datos">
                <label for="email">E-mail *</label>
                <input type="text" value="" placeholder="Correo electrónico">
            </div>
            <div class="datos">
                <label for="clave">Contraseña *</label>
                <input type="password" value="" placeholder="Contraseña">             
                <a href="">¿Olvidaste la contraseña?</a>
            </div>
            <div class="botones">
                <button>Iniciar sesión</button>
                <span>o conéctate con</span>
                <div class="redes">
                    <img src="media/facebook.png" alt="facebook">
                    <img src="media/google.png" alt="Google">
                </div>
            </div>
        </div>
    </main>
</body>
</html>
